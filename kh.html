        /* استایل کارت‌های دایره‌ای دسته‌بندی اصلی غول‌پیکر دیجی‌کالا */
        .category-main-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            text-decoration: none;
            width: 200px; /* عریض شدن کادر کلی کارت */
        }

        .category-circle-img {
            width: 200px; /* افزایش فوق‌العاده ابعاد دایره به ۲۲۰ پیکسل */
            height: 200px; /* افزایش فوق‌العاده ابعاد دایره به ۲۲۰ پیکسل */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .category-circle-img i {
            font-size: 72px; /* فوق درشت شدن آیکون داخل دایره */
            color: #ffffff;
        }

        .category-main-card span {
            font-size: 18px; /* درشت‌تر شدن فونت عنوان دسته‌بندی اصلی */
            font-weight: bold;
            color: #3f4044;
            text-align: center;
        }

        .category-main-card:hover .category-circle-img {
            transform: translateY(-10px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.16);
        }

        /* تصویر بزرگ بنر بالای صفحه جدید دسته‌بندی */
        .category-hero-banner {
            width: 100%;
            height: 380px; /* افزایش ارتفاع بنر به سایز سینمایی و عریض */
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px; /* درشت‌ترین حالت متن بنر */
            font-weight: bold;
            color: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            margin-bottom: 50px;
            text-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        /* شبکه کارت‌های محصول در صفحه جدید دسته‌بندی */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); /* کارت‌های کالا بسیار عریض‌تر شدند */
            gap: 30px;
        }

        /* کارت‌های کالا با ابعاد بزرگتر زیر بنر صنف */
        .product-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 25px; /* افزایش چشمگیر فضای داخلی کارت کالا */
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid #e0e0e2;
            transition: box-shadow 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .img-small-box {
            width: 100%;
            height: 200px; /* بزرگ شدن کادر تصویر اختصاصی محصول */
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        .product-card h3 {
            font-size: 16px; /* بزرگ و خوانا شدن نام کالا */

            line-height: 1.6;
            min-height: 52px;
            text-align: right;
            font-weight: bold;

            color: #ef4056;
            text-align: left;
            margin-top: auto;

            font-weight: bold;
            text-align: center;
            cursor: pointer;
            border: none;
            width: 100%;
        }
